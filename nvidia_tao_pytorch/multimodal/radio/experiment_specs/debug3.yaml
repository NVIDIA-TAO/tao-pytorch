dataset:
  augmentation:
    mean:
    - 0.485
    - 0.456
    - 0.406
    patch_size: 16
    random_flip:
      enable: true
      hflip_probability: 0.1
      vflip_probability: 0
    random_rotate:
      enable: true
      angle_range: [-5.0, 5.0]
    random_aug:
      enable: false
    perspective_distortion:
      enable: true
      scale: [0.01, 0.05]
    random_color:
      enable: false
    random_erase:
      enable: false
    with_random_blur: false
    with_random_crop: false
    with_scale_random_crop:
      enable: false
    use_continuous_rotation: false
  batch_size: 16
  img_size: 224
  num_classes: 0
  root_dir: /lustre/fsw/portfolios/edgeai/projects/edgeai_tao-ptm_image-foundation-model-clip/datasets/imagenet2012
  test_dataset:
    images_dir: /lustre/fsw/portfolios/edgeai/projects/edgeai_tao-ptm_image-foundation-model-clip/datasets/imagenet2012/val
  train_dataset:
    tar_data_sources:
    - root_dir: /lustre/fsw/portfolios/edgeai/projects/edgeai_tao-ptm_image-foundation-model-clip/datasets/webdataset-secrets-redacted-3.0
      samples_per_file: 100
      scale_factor: 1.0
      steps_per_epoch: 1000
    # - root_dir: /lustre/fsw/portfolios/edgeai/projects/edgeai_tao-ptm_image-foundation-model-clip/datasets/webdataset-secrets-redacted-3.0
    #   samples_per_file: 100
    #   scale_factor: 1.0
    #   steps_per_epoch: 100
    seed: 42
    full_equivariance: false
    shift_equivariance: false
    data_weight_mode: inv_frequency
    prefetch: true
  val_dataset:  # pick either images_dir or tar_data_sources
    images_dir: /lustre/fsw/portfolios/edgeai/projects/edgeai_tao-ptm_image-foundation-model-clip/datasets/imagenet2012/val
    # tar_data_sources:
    # - root_dir: /lustre/fsw/portfolios/llmservice/projects/llmservice_nlp_fm/datasets/classification/imagenet-1k/webdataset
  val_img_size: 224
  val_batch_size: 128
  knn_validation: true
  knn_max_train_batches: 50  # for debugging only
  workers: 1
distill:
  loss_lambda: 1.0
  loss_type: MSE
  # ViTDet: windowed-attention augmentation applied to the student
  vitdet:
    prob: 0.5
    window_sizes: [6, 7, 8, 9, 12, 16]
  teacher:
  - model:
      backbone:
        freeze_backbone: true
        type: siglip2_g_384
    mode: combo
    input_size: 384
    patch_size: 16
    match_student_resolution: false
    upsample_factor: 1
    stochastic_resolutions: { 192: 0.01, 224: 0.2, 256: 0.79 }
    summary_loss_type: cosine
    summary_loss_weight: 1.0
    # Same preprocessing as SAM3 (0.5/0.5); dataset uses ImageNet by default
    norm_mean: [0.5, 0.5, 0.5]
    norm_std: [0.5, 0.5, 0.5]
    # FeatSharp: learned spatial upsampling for high-res distillation targets
    adaptor: featsharp
    upsampler_checkpoint: /lustre/fsw/portfolios/edgeai/users/yuw/experiments/featsharp/siglip2/giant/tome-jaf-nat-rope-long/siglip2_featsharp.inputs-jafar-tiles.attn-natten.rope-qk-1x_norm-phi-s/checkpoints/last.pth.tar
    do_upsample: true
    featsharp_lib_path: /lustre/fsw/portfolios/edgeai/users/yuw/workspace/evfm/libs/FeatUp
  - model:
      backbone:
        freeze_backbone: true
        type: dinov3_vith16plus
    mode: combo
    summary_loss_type: cosine
    summary_loss_weight: 0.5
    input_size: 224
    patch_size: 16
    match_student_resolution: true
    upsample_factor: 1
    stochastic_resolutions: { 192: 0.01, 224: 0.2, 256: 0.79 }
    norm_mean: [0.485, 0.456, 0.406]
    norm_std: [0.229, 0.224, 0.225]
  - model:
      backbone:
        freeze_backbone: true
        type: sam3_default
        pretrained_backbone_path: /lustre/fsw/portfolios/nvr/users/cmccarthy/.cache/huggingface/hub/models--facebook--sam3/snapshots/3c879f39826c281e95690f02c7821c4de09afae7/sam3.pt
    mode: combo
model:
  backbone:
    freeze_backbone: false
    type: c_radio_v3_vit_base_patch16_reg4_dinov2
results_dir: /lustre/fsw/portfolios/edgeai/users/yuw/experiments/cls/distill_multi_teacher
train:
  checkpoint_interval: 1
  clip_grad_norm: 10000.0
  ema_decay: 0.99992
  enable_ema: false
  gpu_ids:
  - 0
  - 1
  - 2
  - 3
  - 4
  - 5
  - 6
  - 7
  num_epochs: 5
  num_gpus: 8
  num_nodes: 1
  optim:
    betas:
    - 0.9
    - 0.999
    lr: 0.001
    optim: adamw
    policy: cosine
    skip_names:
    - bias
    - norm
    - grn
    - gamma
    - beta
    warmup_epochs: 2
    weight_decay: 0.05
  precision: fp32
  resume_training_checkpoint_path: null
  seed: 42
  tensorboard:
    enabled: true
  validation_interval: 1
wandb:
  enable: true
  project: cls-distill-multi-teacher
  name: debug3-2nodes