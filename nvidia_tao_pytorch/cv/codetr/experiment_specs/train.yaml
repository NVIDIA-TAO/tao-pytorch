dataset:
  dataset_type: default
  num_classes: 80
  contiguous_labels: true
  batch_size: 2
  # eval_batch_size: 2
  augmentation:
    fixed_padding: true
    pad_size_divisor: 32        # match Co-DETR Pad(size_divisor=32); takes precedence over fixed_padding
    fixed_random_crop: 1536
    input_mean: [0.485, 0.456, 0.406]
    input_std: [0.229, 0.224, 0.225]
    test_random_resize: 1280
    random_resize_max_size: 2048
    # fixed_random_crop: 640
    # scales: [480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800]
    # input_mean: [0.485, 0.456, 0.406]
    # input_std: [0.229, 0.224, 0.225]
    # test_random_resize: 1280
    # random_resize_max_size: 2048
    # random_flip: 0.5
  train_data_sources:
    - image_dir: ???
      json_file: ???
  val_data_sources:
    - image_dir: ???
      json_file: ???
  infer_data_sources:
    image_dir: ???
    classmap: ???
  test_data_sources:
    image_dir: ???
    json_file: ???
  eval_class_ids: null

train:
  num_gpus: 1
  num_nodes: 1
  num_epochs: 12
  checkpoint_interval: 1
  validation_interval: 1
  precision: fp32
  distributed_strategy: ddp
  activation_checkpoint: True
  clip_grad_norm: 0.1
  is_dry_run: False
  pretrained_model_path: null
  resume_training_checkpoint_path: null
  freeze: []
  optim:
    optimizer: AdamW
    lr: 2.0e-4
    lr_backbone: 2.0e-5
    lr_linear_proj_mult: 0.1
    weight_decay: 1.0e-4
    lr_scheduler: MultiStep
    lr_steps: [11]
    lr_decay: 0.1
    layer_decay_rate: 0.65
    monitor_name: val_loss
inference:
  checkpoint: ???
  conf_threshold: 0.5
  input_width: 640
  input_height: 640
evaluate:
  checkpoint: ???
  conf_threshold: 0.0
  # input_width: 640
  # input_height: 640