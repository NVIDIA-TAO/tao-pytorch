results_dir: ???
model:
  backbone: vit_large_codetr
  num_queries: 1500
  num_feature_levels: 5
  return_interm_indices: [0, 1, 2, 3, 4]
  two_stage_type: standard
  num_co_heads: 2
  co_head_num_convs: 1
  hidden_dim: 256
  nheads: 8
  enc_layers: 6
  dec_layers: 6
  dim_feedforward: 2048
  dec_n_points: 4
  enc_n_points: 4
  pe_temperatureH: 20
  pe_temperatureW: 20
  num_select: 1000
  # Match original Co-DETR test_cfg[0] for the main DETR query head:
  #   dict(max_per_img=1000, nms=dict(type='soft_nms', iou_threshold=0.8))
  soft_nms_enabled: true
  soft_nms_method: linear
  soft_nms_iou_threshold: 0.8
