<svg xmlns="http://www.w3.org/2000/svg" width="900" height="390" viewBox="0 0 900 390" role="img" aria-labelledby="title desc">
  <title id="title">TAO PyTorch testing funnel</title>
  <desc id="desc">Testing starts with documentation checks, then targeted task tests, broader domain tests, and GPU or TensorRT validation when needed.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .stage1 { fill: #ecfdf5; stroke: #047857; stroke-width: 1.7; rx: 10; }
      .stage2 { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.7; rx: 10; }
      .stage3 { fill: #eef2ff; stroke: #4f46e5; stroke-width: 1.7; rx: 10; }
      .stage4 { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.7; rx: 10; }
      .label { font: 600 15px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .path { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="label">Testing And Debugging Funnel</text>

  <rect x="310" y="70" width="280" height="62" class="stage1"/>
  <text x="450" y="96" text-anchor="middle" class="label">1. Static/doc checks</text>
  <text x="450" y="116" text-anchor="middle" class="small">diff check, README generator</text>

  <rect x="260" y="160" width="380" height="62" class="stage2"/>
  <text x="450" y="186" text-anchor="middle" class="label">2. Targeted task tests</text>
  <text x="450" y="206" text-anchor="middle" class="small">config, model, dataloader, export</text>

  <rect x="210" y="250" width="480" height="62" class="stage3"/>
  <text x="450" y="276" text-anchor="middle" class="label">3. Broader domain/shared tests</text>
  <text x="450" y="296" text-anchor="middle" class="small">tests/core, cv_unit, multimodal, ssl, pointcloud</text>

  <rect x="160" y="340" width="580" height="36" class="stage4"/>
  <text x="450" y="364" text-anchor="middle" class="label">4. Environment-specific validation: GPU, TensorRT, datasets, private checkpoints</text>

  <path d="M450 132 V160" class="path"/>
  <path d="M450 222 V250" class="path"/>
  <path d="M450 312 V340" class="path"/>
</svg>
